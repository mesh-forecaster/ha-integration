<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="128" height="128" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">Solar Charge Scheduler Icon</title>
  <desc id="desc">Sun, battery and charging waveform representing charging in cheap periods</desc>

  <!-- subtle background circle -->
  <circle cx="64" cy="64" r="62" fill="#ffffff" opacity="0.02"/>

  <!-- sun (top-left) -->
  <g transform="translate(18,16)">
    <circle cx="18" cy="18" r="12" fill="url(#gSun)"/>
    <g stroke="rgba(0,0,0,0.06)" stroke-width="2" stroke-linecap="round">
      <line x1="18" y1="-2" x2="18" y2="-8"/>
      <line x1="18" y1="38" x2="18" y2="44"/>
      <line x1="-2" y1="18" x2="-8" y2="18"/>
      <line x1="38" y1="18" x2="44" y2="18"/>
      <line x1="6" y1="6" x2="1" y2="1"/>
      <line x1="30" y1="6" x2="35" y2="1"/>
      <line x1="30" y1="30" x2="35" y2="35"/>
      <line x1="6" y1="30" x2="1" y2="35"/>
    </g>
  </g>

  <!-- battery (center-right) -->
  <g transform="translate(52,34)">
    <!-- battery body -->
    <rect x="0" y="12" width="54" height="28" rx="4" ry="4" fill="#1E293B" />
    <!-- battery terminal -->
    <rect x="54" y="18" width="6" height="16" rx="2" ry="2" fill="#1E293B" />
    <!-- inner battery background -->
    <rect x="4" y="16" width="46" height="20" rx="2" ry="2" fill="#0F172A" />

    <!-- charge level band (shows current/target charge) -->
    <rect x="4" y="20" width="34" height="12" rx="2" ry="2" fill="url(#gCharge)"/>
    <!-- thin divider to show units -->
    <g opacity="0.12" stroke="#fff" stroke-width="1">
      <line x1="14" y1="18" x2="14" y2="32"/>
      <line x1="24" y1="18" x2="24" y2="32"/>
      <line x1="34" y1="18" x2="34" y2="32"/>
    </g>

    <!-- lightning bolt overlay (represents cheap charging) -->
    <path d="M22 12 L16 22 L24 22 L14 36 L30 20 L22 20 Z"
          transform="translate(6,0)"
          fill="#FFD166" opacity="0.98" />
  </g>

  <!-- waveform / price-curve (bottom-left) -->
  <g transform="translate(12,78)">
    <path d="M0 24 C10 10, 26 6, 40 12 C54 18, 70 28, 86 12"
          fill="none" stroke="#0EA5A4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- marker (cheap period) -->
    <rect x="38" y="6" width="8" height="18" rx="2" fill="#34D399" opacity="0.9"/>
  </g>

  <!-- defs for gradients -->
  <defs>
    <linearGradient id="gSun" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#FFD166"/>
      <stop offset="100%" stop-color="#FF8A00"/>
    </linearGradient>

    <linearGradient id="gCharge" x1="0" x2="1">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
  </defs>
</svg>
